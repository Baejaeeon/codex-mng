spring:
  config:
    activate:
      on-profile: verify
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email

codex:
  usage:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN}
